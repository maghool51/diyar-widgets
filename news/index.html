<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اخبار فوری - Diyar Widgets News Ticker v2.0</title>
    
    <!-- SEO -->
    <meta name="description" content="ویجت خبری حرفه‌ای، سریع و مستقل برای نمایش آخرین اخبار - Diyar Widgets News Ticker v2.0">
    <link rel="canonical" href="https://maghool51.github.io/diyar-widgets/news/">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#dc2626">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Diyar Widgets News Ticker v2.0">
    <meta property="og:description" content="ویجت خبری حرفه‌ای، سریع و مستقل برای نمایش آخرین اخبار">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maghool51.github.io/diyar-widgets/news/">
    <meta property="og:image" content="https://maghool51.github.io/diyar-widgets/news/og-image.jpg">
    
    <!-- CSS -->
    <link rel="stylesheet" href="ticker.css">
</head>
<body>
    <!-- ============================================
         نیوزتیکر - نسخه ویجت
         ============================================ -->
    <div class="ticker-wrapper" role="region" aria-label="نوار اخبار فوری">
        <div class="ticker-label">
            <span class="blink-dot" aria-hidden="true"></span>
            <span class="label-text">اخبار فوری</span>
        </div>
        <div class="ticker-container">
            <div class="ticker-track" id="tickerTrack">
                <div class="ticker-loading" aria-label="در حال بارگذاری">⏳ در حال بارگذاری اخبار...</div>
            </div>
        </div>
    </div>

    <!-- ============================================
         اسکریپت‌ها
         ============================================ -->
    <script src="config.js"></script>
    <script src="ticker.js"></script>
</body>
</html>
