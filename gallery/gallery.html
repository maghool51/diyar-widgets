<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>گالری تصاویر - دیار نیوز</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }
        .gallery-app { max-width: 1300px; margin: 0 auto; }
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 30px;
            border-radius: 16px;
            color: white;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .gallery-header h1 { font-size: 26px; }
        .gallery-header p { opacity: 0.7; font-size: 14px; margin-top: 4px; }
        .header-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.12);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.25); }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }
        .gallery-item {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: 0.35s;
        }
        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .gallery-item .image-wrap {
            background: #f0f2f5;
            overflow: hidden;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-item .image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-item .info { padding: 12px 14px 14px; }
        .gallery-item .filename {
            font-size: 12px;
            color: #888;
            word-break: break-all;
            direction: ltr;
            text-align: left;
            font-family: monospace;
            background: #f8f9fa;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        .gallery-item .link-box {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .gallery-item .link-box input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            font-size: 11px;
            background: #f8f9fa;
            color: #555;
            direction: ltr;
            text-align: left;
            font-family: monospace;
            cursor: pointer;
            min-width: 0;
        }
        .gallery-item .link-box .copy-btn {
            padding: 6px 14px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: 0.2s;
        }
        .gallery-item .link-box .copy-btn:hover { background: #2a2a4e; }
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            grid-column: 1 / -1;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 10px; }
        .empty-state h3 { color: #1a1a2e; font-size: 20px; }
        .empty-state p { color: #888; font-size: 15px; }
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            z-index: 9999;
            background: #1a1a2e;
            color: white;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #1e7e34; }
        .toast.error { background: #b3261e; }
        .gallery-footer {
            text-align: center;
            padding: 25px 20px 5px;
            color: #aaa;
            font-size: 13px;
            border-top: 1px solid #e8e8e8;
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .gallery-header { flex-direction: column; text-align: center; }
            .gallery-header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="gallery-app">
    <header class="gallery-header">
        <div>
            <h1>🖼️ گالری تصاویر</h1>
            <p>مدیریت تصاویر دیار نیوز</p>
        </div>
        <a href="../news/" class="header-btn">📰 دیار نیوز</a>
    </header>

    <div class="gallery-grid" id="galleryGrid">
        <div class="loading-state">⏳ در حال بارگذاری تصاویر...</div>
    </div>

    <footer class="gallery-footer">
        <p>© ۱۴۰۵ گالری دیار نیوز</p>
    </footer>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== تنظیمات ==========
const REPO = 'maghool51/diyar-widgets';
const BRANCH = 'main';
const GALLERY_PATH = 'gallery';
const BASE_RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${GALLERY_PATH}/`;

// ========== DOM ==========
const grid = document.getElementById('galleryGrid');
const toast = document.getElementById('toast');

// ========== Toast ==========
function showToast(msg, type = 'info') {
    toast.textContent = msg;
    toast.className = `toast show ${type}`;
    clearTimeout(toast._hide);
    toast._hide = setTimeout(() => toast.className = 'toast', 2500);
}

// ========== بارگذاری عکس‌ها ==========
async function loadGallery() {
    try {
        const apiUrl = `https://api.github.com/repos/${REPO}/contents/${GALLERY_PATH}`;
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
            if (response.status === 404) {
                throw new Error('پوشه گالری وجود ندارد');
            }
            throw new Error(`خطا: ${response.status}`);
        }

        const files = await response.json();
        const images = files.filter(f => 
            f.name.match(/\.(jpg|jpeg|png|webp|gif|svg|bmp|ico)$/i) && f.type === 'file'
        );

        if (images.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📂</div>
                    <h3>هیچ عکسی یافت نشد</h3>
                    <p>هنوز عکسی در گالری آپلود نشده است</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = '';
        images.forEach((img, index) => {
            const url = BASE_RAW + img.name;
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.style.animationDelay = `${(index % 20) * 0.04}s`;
            const safeId = 'link-' + img.name.replace(/[^a-zA-Z0-9]/g, '-');
            
            item.innerHTML = `
                <div class="image-wrap">
                    <img src="${url}" alt="${img.name}" loading="lazy" 
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%23f0f2f5%22 width=%22300%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2240%22%3E❌%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="info">
                    <div class="filename">📎 ${img.name}</div>
                    <div class="link-box">
                        <input type="text" value="${url}" id="${safeId}" readonly>
                        <button class="copy-btn" onclick="copyLink('${safeId}')">📋</button>
                    </div>
                </div>
            `;
            grid.appendChild(item);
        });

    } catch (error) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="icon">📂</div>
                <h3>خطا در بارگذاری</h3>
                <p>${error.message}</p>
            </div>
        `;
        console.error('Gallery Error:', error);
    }
}

// ========== کپی لینک ==========
function copyLink(inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.select();
    try {
        navigator.clipboard.writeText(input.value);
        showToast('✅ لینک عکس کپی شد!', 'success');
    } catch {
        document.execCommand('copy');
        showToast('✅ لینک عکس کپی شد!', 'success');
    }
}

// ========== شروع ==========
loadGallery();
</script>

</body>
</html>
